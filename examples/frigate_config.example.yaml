# =============================================================================
# EXAMPLE Frigate config snippet — GenAI object descriptions + Coral TPU
# =============================================================================
# This lives on the FRIGATE host (its config.yaml), NOT in Home Assistant.
# It shows the Frigate-side setup the VLM alerting pipeline depends on:
#   - a detector (Coral USB TPU here)
#   - GenAI provider + per-camera object-description prompts
#   - the JSON schema your prompt should emit (drives the HA rules)
#   - zone / required_zones alignment so descriptions actually generate
#
# Written for Frigate 0.15.x config shape. For 0.17+, the per-camera genai.*
# keys move under genai.objects.* — see docs/UPGRADE_FRIGATE_0.17.md.
#
# Replace every <placeholder>, zone name, and identity detail with your own.
# =============================================================================

mqtt:
  enabled: true
  host: <MQTT_BROKER_HOST>        # e.g. core-mosquitto for the HA add-on
  user: <MQTT_USER>
  password: <MQTT_PASSWORD>

# --- Detector: Google Coral USB Edge TPU -------------------------------------
detectors:
  coral:
    type: edgetpu
    device: usb

# --- Semantic Search is a prerequisite for GenAI -----------------------------
semantic_search:
  enabled: true

# --- GenAI provider (global). Per-camera prompts are defined under each camera.
# On 0.17+, only the PROVIDER stays global; the rest moves under camera genai.objects.
genai:
  enabled: true
  provider: gemini
  api_key: <GEMINI_API_KEY>
  model: gemini-2.5-flash

# Global object tracking defaults (narrow per-camera below).
objects:
  track:
    - person
    - car
    - dog
    - cat

cameras:

  # ===========================================================================
  # EXAMPLE: a hazard-area camera (e.g. pool / restricted zone) with GenAI
  # ===========================================================================
  example_camera:
    ffmpeg:
      # Using go2rtc restream is recommended; point detect at the substream.
      inputs:
        - path: rtsp://127.0.0.1:8554/example_camera          # main / high-res
          input_args: preset-rtsp-restream
          roles: [record]
        - path: rtsp://127.0.0.1:8554/example_camera_sub      # substream
          input_args: preset-rtsp-restream
          roles: [detect]

    detect:
      enabled: true
      width: 640        # match your substream resolution
      height: 360
      fps: 7

    objects:
      track:
        - person
      filters:
        person:
          # Lower these ONLY if you must reliably detect small/distant subjects
          # (e.g. a small child far from the camera). Trade-off: more false
          # positives. Defaults are min_score 0.5 / threshold 0.7.
          min_score: 0.4
          threshold: 0.6

    # Which review items become ALERTS (vs detections). The notification
    # baseline only alerts on these zones — keep this list correct or events
    # silently downgrade to detections and you get no baseline alert.
    review:
      alerts:
        labels: [person]
        required_zones:
          - <zone_a>
          - <zone_b>

    zones:
      <zone_a>:
        coordinates: 0.1,0.1,0.9,0.1,0.9,0.9,0.1,0.9    # draw in the Frigate UI
      <zone_b>:
        coordinates: 0.3,0.3,0.7,0.3,0.7,0.7,0.3,0.7

    # --- GenAI object descriptions for THIS camera ---------------------------
    genai:
      enabled: true
      use_snapshot: true            # describe the best snapshot, not the thumbnail
      objects:
        - person                    # only run GenAI on these labels
      required_zones:               # only describe objects that entered these
        - <zone_a>                  # IMPORTANT: must cover everywhere you want a
        - <zone_b>                  # description — objects outside these zones
                                    # generate NO description (and no VLM alert).
      # ---------------------------------------------------------------------
      # PROMPT — emits the structured JSON the HA rules consume.
      #
      # ⚠️ GOTCHA: Frigate runs this prompt through Python str.format(), so
      #    EVERY literal brace must be DOUBLED ({{ }} -> { }). This applies to
      #    the JSON braces AND any '{' / '}' you write in prose. A single brace
      #    anywhere throws KeyError and silently disables GenAI for the camera.
      #
      # ⚠️ The "no markdown fences" instruction does NOT reliably work — Gemini
      #    often wraps output in ```json anyway. The HA preprocessor strips
      #    fences regardless, so don't rely on the model obeying it.
      #
      # Keep `confidence` and `image_quality` IDENTICAL across all cameras —
      # they drive the HA quality gate. `schema_version` lets you evolve safely.
      # ---------------------------------------------------------------------
      prompt: |
        You are analysing one snapshot for a home-security system. Reference points in
        this view: <briefly name the fixed areas, e.g. pool / deck / lawn / gate>.

        GROUNDING - read before answering. The motion detector can fire on shadows,
        moving foliage, reflections/ripples, rain, insects on the lens, and animals.
        Do NOT treat any of those as a person. Count a person ONLY if you can clearly
        see a human (body, limbs, head). If you cannot, set person_count to 0 and
        person_present to false.

        DESCRIBE BEFORE YOU DECIDE - fill "scene_observation" and the "people" array
        FIRST, then fill every field below so it agrees with what you described.
        "people" has one object per clearly-visible human; if none, use []. person_count
        MUST equal the number of entries in "people"; children_count MUST equal those
        whose apparent_age is "child". If "people" is empty, every person/child boolean
        below is false. Never report a person, child, or action you did not actually see.

        IDENTITY - do NOT name people or guess whether someone is a resident, family, or a
        stranger (face/identity recognition is unreliable). Classify only by apparent age
        (adult vs child). Drive alerts off BEHAVIOUR and SAFETY, not identity.

        Respond with ONLY a JSON object (no extra text). Doubled braces are required
        (Frigate runs the prompt through str.format()):
        {{
          "schema_version": 3,
          "scene_observation": "<1-2 sentences: what you LITERALLY see, and what most likely triggered this snapshot (person? animal? shadows/foliage?)>",
          "people": [
            {{ "appearance": "<build + clothing/colours>", "apparent_age": "<child|teen|adult|unsure>", "location": "<name the area, e.g. pool_water|pool_edge|lawn|gate|street|unclear>", "action": "<what they are doing>" }}
          ],
          "person_present": <true only if the people array is non-empty and a real human is clearly visible>,
          "likely_false_detection": <true if the trigger is probably NOT a person - shadow, foliage, reflection, animal>,
          "person_count": <equals the length of the people array; 0 if none>,
          "adults_count": <integer>,
          "children_count": <people whose apparent_age is child; 0 if none>,
          "child_in_water": <true if a child is clearly in the pool water>,
          "child_near_pool_edge": <true if a child is clearly within ~1m of the pool edge>,
          "child_supervised": <true if, for any child present, an adult is clearly within ~5m>,
          "suspicious_behavior": <true|false>,
          "suspicious_behavior_details": "<short text or null>",
          "confidence": "<low|medium|high>",
          "image_quality": "<poor|fair|good>",
          "summary": "<ONE sentence describing only the notable ACTION; no scenery/objects. If nothing notable, say so briefly.>"
        }}

  # ===========================================================================
  # A camera WITHOUT GenAI (indoor / privacy) — detection only.
  # ===========================================================================
  indoor_camera:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/indoor_camera
          input_args: preset-rtsp-restream
          roles: [record, detect]
    objects:
      track: [person]
    genai:
      enabled: false
